- name: Install and Configure PostgreSQL
  hosts: private
  become: yes

  vars:
    pg_db: samplepgdb
    pg_user: pguser
    pg_password: pg123

  tasks:

    - name: Install PostgreSQL
      apt:
        name: postgresql
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Create PostgreSQL user
      shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ pg_user }}'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE USER {{ pg_user }} WITH PASSWORD '{{ pg_password }}';"
      args:
        executable: /bin/bash

    - name: Create PostgreSQL database
      shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ pg_db }}'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE DATABASE {{ pg_db }} OWNER {{ pg_user }};"
      args:
        executable: /bin/bash

    - name: Create sample table
      become: yes
      shell: >
        sudo -u postgres psql {{ pg_db }} -c
        "CREATE TABLE IF NOT EXISTS employees (
         id SERIAL PRIMARY KEY,
         name VARCHAR(100),
         role VARCHAR(100)
        );"

    - name: Insert sample data safely
      shell: |
        sudo -u postgres psql {{ pg_db }} -c "
        INSERT INTO employees (name, role)
        SELECT 'Jayani', 'DevOps Engineer'
        WHERE NOT EXISTS (SELECT 1 FROM employees WHERE name='Jayani');

        INSERT INTO employees (name, role)
        SELECT 'Admin', 'DB Admin'
        WHERE NOT EXISTS (SELECT 1 FROM employees WHERE name='Admin');
        "
      args:
        executable: /bin/bash